# Deploy production Hosting when `main` updates.
# One-time: GitHub → repo Settings → Secrets and variables → Actions → New repository secret
#   Name (Firebase CLI default): FIREBASE_SERVICE_ACCOUNT_ASCENDCONTRACTING_F14EC
#   OR shorter name: FIREBASE_SERVICE_ACCOUNT, then set firebaseServiceAccount below to match.
#   Value: full JSON from Firebase Console → Project settings → Service accounts →
#          Generate new private key.

name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install and build
        run: npm ci && npm run build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASCENDCONTRACTING_F14EC }}
          projectId: ascendcontracting-f14ec
          channelId: live
